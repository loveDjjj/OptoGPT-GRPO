# =========================
# OptoGPT + Dataset GRPO Config
# =========================
#
# This preset targets:
# - 1x RTX 5090 with 32 GB VRAM
# - the current dataset-level gate-spectrum GRPO pipeline
# - a more aggressive setting than the previous conservative default
#
# Why this can be larger:
# - the checkpoint has about 63.86M parameters
# - raw FP32 weights are only about 244 MB
# - the main runtime bottlenecks are sampling, logprob recomputation,
#   and TMM batching, not the model weights themselves
#
# Important memory note:
# - grpo.target_batch_size increases backward-graph memory roughly linearly
# - sampling.batch_size mainly affects decode throughput
# - tmm.batch_size mainly affects reward throughput

experiment:
  # Run name. Output directory becomes outputs/<name>_<timestamp>
  name: grpo_gate_dataset_5090_fast
  # Global random seed
  seed: 42

# Runtime device:
# - auto: choose cuda if available, otherwise cpu
# - cuda:0: explicitly bind to GPU 0
device: auto

paths:
  # Pretrained OptoGPT checkpoint
  optogpt_checkpoint: model/optogpt.pt
  # Root output directory
  output_dir: outputs
  # Optical constants database directory
  nk_dir: nk

target:
  # Current standard mode
  mode: gate_dataset
  # Number of training targets
  # Keep this moderate. Training samples targets randomly each step.
  train_count: 512
  # Number of fixed evaluation targets
  # Larger eval sets improve confidence but slow periodic evaluation.
  eval_count: 32
  train_seed: 42
  eval_seed: 43
  # Wavelength range in um, i.e. 400-1100 nm
  wavelength_min_um: 0.4
  wavelength_max_um: 1.1
  # Number of wavelength points. Must match model/TMM expectations.
  num_points: 71
  # Gate-width range in nm
  width_min_nm: 80
  width_max_nm: 400
  # Edge smoothing in nm. 0 means a hard gate.
  edge_smooth_nm: 20
  # Target families:
  # - pass: high absorption inside the gate, low outside
  # - stop: low absorption inside the gate, high outside
  families: [pass, stop]
  # Current target construction assumption:
  # T_target = 0
  # R_target = 1 - A_target

sampling:
  # Oversample count per target before exact deduplication.
  # Set equal to sampling.batch_size so one target can be decoded in one large
  # batch, which improves utilization and reduces chunk overhead.
  oversample_count: 1024
  # Number of unique structures kept for GRPO per target.
  # Reduced from 96 to 64 to speed up GRPO logprob recomputation.
  unique_candidates: 64
  # Batched decode size for OptoGPT sampling.
  # With the current model size, 1024 is a good high-throughput target on 32 GB
  # VRAM, while still keeping the experiment scale smaller overall.
  batch_size: 1024
  # Decode mode: greedy / top-k / sample
  decode: top-k
  # Slightly wider sampling support to improve unique-structure yield
  top_k: 20
  top_p: 0.90
  temperature: 1.0
  start_symbol: BOS
  # Optional fixed material token after BOS; null means no forcing
  start_mat: null
  # null means use checkpoint default max_len
  max_len: null

tmm:
  wavelength_range_um: [0.4, 1.1]
  # Must stay aligned with target.num_points
  num_points: 71
  incident_angle: 0.0
  polarization: 0
  # Optional material alias map, e.g. {Ag: Ag_HZ}
  material_aliases: {}
  # TMM batch size.
  # With target_batch_size=4 and unique_candidates=64, one train step will
  # usually flatten at most about 256 structures.
  batch_size: 256
  # Pad each TMM batch to its local max layer count
  pad_to_max_layers: true
  # Zero-thickness Air padding layers
  pad_material: Air
  debug: false

reward:
  # Current reward:
  # A = 1 - R - T
  # reward = -RMSE(A_pred, A_target)
  metric: absorption_rmse
  invalid_structure_penalty: 1.0
  nonphysical_spectrum_penalty: 1.0
  physical_tolerance: 0.01

grpo:
  # Total optimizer steps.
  # Smaller than the previous setting to reduce total wall-clock time.
  steps: 1000
  # Number of targets sampled per optimizer step.
  # Kept moderate because targets are still processed mostly sequentially in the
  # current trainer, so increasing this does not improve utilization as much as
  # increasing sampling.batch_size does.
  target_batch_size: 4
  # Candidates used per target for GRPO update
  group_size: 64
  # Full eval interval
  # Keep it moderate because eval also runs sampling + dedup + TMM.
  eval_interval: 200
  # Full-parameter RL is still sensitive; keep LR stable
  learning_rate: 5.0e-6
  clip_eps: 0.2
  kl_beta: 0.02
  max_grad_norm: 1.0
  # Batch size for current/reference logprob recomputation.
  # One whole target group fits in one pass.
  logprob_batch_size: 64

evaluation:
  # Target chunk size during evaluation.
  # Evaluation is inference-only, so this can be slightly larger.
  target_batch_size: 8
  # Number of training targets to visualize before/after training
  train_compare_count: 8
  # Seed for selecting the fixed train comparison subset
  train_compare_seed: 31415

plotting:
  save_eval_plots: true
  # Number of eval targets to draw before/after plots for
  eval_plot_limit: 8
  save_train_plots: true
  # Number of train-subset targets to draw before/after plots for
  train_plot_limit: 8
  save_eval_curve: true

checkpoints:
  save_best: true
  save_final: true

logging:
  # Print high-level console logs
  console_log: true
  # Show the outer training progress bar
  progress_bar: true
  # Show progress bars for eval / before-after comparison passes
  eval_progress_bar: true
  # Print one concise training status line every N steps
  log_interval: 20
  save_targets: true
  # Large RL runs generate huge rollout logs. Keep this off by default.
  save_rollouts: false
  train_targets_filename: train_targets.jsonl
  eval_targets_filename: eval_targets.jsonl
  rollouts_filename: rollouts.jsonl
  before_eval_filename: before_eval.csv
  after_eval_filename: after_eval.csv
  before_train_compare_filename: before_train_compare.csv
  after_train_compare_filename: after_train_compare.csv
  train_metrics_filename: train_metrics.csv
  eval_metrics_filename: eval_metrics.csv
  summary_filename: summary.csv
