# =========================
# OptoGPT 光谱损失微调配置
# =========================

experiment:
  # 输出目录会变成 outputs/sft/<name>_<timestamp>
  name: spectral_sft
  seed: 42

device: auto

paths:
  # 基座模型 checkpoint
  checkpoint: model/optogpt.pt
  output_dir: outputs/sft
  materials_dir: data/materials

data:
  train_spectrum_path: dataset/Spectrum_train.npy
  train_structure_path: dataset/Structure_train.npy
  # spectral SFT 训练阶段不依赖训练集真值结构。
  # 打开后可避免每个 rank 都加载超大的 Structure_train.npy，加快多卡启动。
  skip_train_structure_loading: true
  # 当前阶段默认把原 test 集作为验证集
  val_spectrum_path: dataset/Spectrum_test.npy
  val_structure_path: dataset/Structure_test.npy
  max_train_samples: null
  max_val_samples: null
  # `num_workers > 0` 就是多进程加载。
  # 这里默认调到 8，优先改善单卡时的数据等待；多卡时若 CPU 压力过大，可按每卡 4 往回调。
  num_workers: 64
  pin_memory: true
  prefetch_factor: 4
  val_ratio: 0.0

sampling:
  train:
    # 训练时建议保留一定随机性，让模型探索不同结构
    decode: top-k
    top_k: 20
    top_p: 0.9
    temperature: 1.0
    start_symbol: BOS
    start_mat: null
    max_len: null
    batch_size: 1024
  eval:
    # 训练过程中的验证仍然使用 greedy，保证指标稳定可比
    decode: greedy
    top_k: 10
    top_p: 0.9
    temperature: 1.0
    start_symbol: BOS
    start_mat: null
    max_len: null
    batch_size: 1024

training:
  epochs: 5
  # 当前模型不大，单卡吞吐优先把训练 batch 提高到 1024。
  batch_size: 1024
  learning_rate: 1.0e-5
  weight_decay: 0.0
  grad_clip_norm: 1.0
  grad_accum_steps: 1
  log_interval: 500
  eval_every_epochs: 1
  # 每条目标光谱生成几个候选结构。当前先默认 1，保证主流程稳定。
  num_samples_per_target: 1
  # rollout 采样和重算 logprob 默认共用 `eval` 前向模式，
  # 只关闭 dropout，不影响 score 阶段的 autograd 与参数更新。
  # 若明确希望把 dropout 也视作策略随机性的一部分，再手动切回 `train`。
  policy_forward_mode: eval
  # 是否对 batch 内光谱损失做去中心化。
  # 开启后：低于 batch 均值的样本会被提升概率，高于均值的样本会被压低概率。
  center_spectrum_loss: true
  # 是否按序列长度归一化对数概率，避免长序列天然占更大权重。
  normalize_logprob_by_length: true
  save_best: true
  save_final: true
  # 训练结束后由主进程根据按 epoch 汇总的 CSV 自动绘制曲线总览。
  save_epoch_plots: true

evaluation:
  # 验证默认不开绘图和样本落盘，因而可以把无梯度评测 batch 适度调大；
  # 若显存不足，再把这两项回调到 64。
  batch_size: 1024
  scoring_batch_size: 1024
  save_samples: false
  # SFT 训练过程中的验证优先看数值指标，不默认保存逐样本图。
  save_plots: false
  save_predicted_spectra: false
  # 训练中的验证不默认生成统计图，完整绘图留给独立评测入口。
  save_distribution_plots: false
  splits: [val]

tmm:
  wavelength_range_um: [0.4, 1.1]
  num_points: 71
  incident_angle: 0.0
  polarization: 0
  material_aliases: {}
  batch_size: 1024
  # 固定补到 20 层，保证所有 batch 的 TMM 张量形状一致，减少形状抖动与分桶开销。
  pad_to_max_layers: true
  fixed_max_layers: 20
  bucket_by_layer_count: false
  pad_material: Air
  debug: false
  # 当前默认直接比较拼接后的 R/T 光谱，不再使用吸收率误差。
  metric: rt_rmse

losses:
  # `rt_rmse` 表示直接比较 `[R..., T...]` 两段光谱的 RMSE。
  spectrum_metric: rt_rmse
  invalid_structure_penalty: 1.0
  nonphysical_spectrum_penalty: 1.0
  physical_tolerance: 0.001

logging:
  console_log: true
  # 是否按 DataLoader 的 batch 数量显示 tqdm 进度条。
  show_progress_bar: true

distributed:
  timeout_minutes: 30
