# =========================
# OptoGPT 光谱评测配置
# =========================

experiment:
  # 实验名。输出目录会变成 outputs/eval/<name>_<timestamp>
  name: spectrum_eval
  # 全局随机种子
  seed: 42

# 运行设备：
# - auto：自动选择 cuda / cpu
# - cuda:0：显式绑定单卡
device: auto

paths:
  # 预训练或微调后的 checkpoint
  checkpoint: model/optogpt.pt
  # 评测输出目录
  output_dir: outputs/eval
  # 材料库目录。nk 已迁移到 data/materials
  materials_dir: data/materials

data:
  # 训练集路径
  train_spectrum_path: dataset/Spectrum_train.npy
  train_structure_path: dataset/Structure_train.npy
  # 当前默认把原 test 集当作验证集使用
  val_spectrum_path: dataset/Spectrum_test.npy
  val_structure_path: dataset/Structure_test.npy
  # 可选：只评测前若干条样本，便于快速调试；null 表示全量
  max_train_samples: null
  max_val_samples: null
  # 若使用 npy 数据，建议至少开到 4；Windows 下也可以逐步试 2/4/8。
  # 若是 4-8 卡长期评测，Linux + NCCL 的跨卡通信效率通常优于 Windows + Gloo。
  num_workers: 4
  pin_memory: true
  prefetch_factor: 2
  # 若未来希望从训练集内部切验证集，可启用该比例
  val_ratio: 0.0

sampling:
  eval:
    # 评测默认用 greedy，保证前后模型可直接比较
    decode: greedy
    top_k: 10
    top_p: 0.9
    temperature: 1.0
    start_symbol: BOS
    start_mat: null
    max_len: null
    batch_size: 64

evaluation:
  # 需要评测的 split
  splits: [train, val]
  batch_size: 32
  scoring_batch_size: 32
  # 是否保存样本级 JSONL。全量数据很大，默认关闭。
  save_samples: false
  # 是否保存目标光谱与生成光谱的可视化对比图。
  # 图像会输出到 outputs/eval/<exp>/plots/<split>/rankXX/ 下。
  save_plots: true
  # 每个 rank 最多保存多少张图，避免全量评测时产出过大。
  plot_max_samples: 32
  # 是否把预测光谱也写入样本记录。若开启，文件体积会明显增大。
  save_predicted_spectra: false

tmm:
  wavelength_range_um: [0.4, 1.1]
  num_points: 71
  incident_angle: 0.0
  polarization: 0
  material_aliases: {}
  batch_size: 128
  pad_to_max_layers: true
  # 按层数分桶可减少不同结构长度混跑时的 padding 浪费。
  bucket_by_layer_count: true
  pad_material: Air
  debug: false
  # 这里只是为了保持配置结构统一，实际使用的指标由 losses.spectrum_metric 控制。
  # 当前默认直接比较拼接后的 R/T 光谱，不再使用吸收率误差。
  metric: rt_rmse

losses:
  # 光谱误差指标。`rt_rmse` 表示直接比较 `[R..., T...]` 两段光谱的 RMSE。
  spectrum_metric: rt_rmse
  invalid_structure_penalty: 1.0
  nonphysical_spectrum_penalty: 1.0
  physical_tolerance: 0.01

logging:
  console_log: true

distributed:
  # 多卡超时时间，单位分钟
  timeout_minutes: 30
