# =========================
# OptoGPT 光谱评测配置
# =========================

experiment:
  # 实验名。输出目录会变成 outputs/eval/<name>_<timestamp>
  name: spectrum_eval
  # 全局随机种子
  seed: 42

# 运行设备：
# - auto：自动选择 cuda / cpu
# - cuda:0：显式绑定单卡
device: auto

paths:
  # 预训练或微调后的 checkpoint
  checkpoint: model/optogpt.pt
  # 评测输出目录
  output_dir: outputs/eval
  # 材料库目录。nk 已迁移到 data/materials
  materials_dir: data/materials

data:
  # 训练集路径
  train_spectrum_path: dataset/Spectrum_train.npy
  train_structure_path: dataset/Structure_train.npy
  # 当前默认把原 test 集当作验证集使用
  val_spectrum_path: dataset/Spectrum_test.npy
  val_structure_path: dataset/Structure_test.npy
  # 可选：只评测前若干条样本，便于快速调试；null 表示全量
  max_train_samples: null
  max_val_samples: null
  # `num_workers > 0` 就是多进程加载。
  # 这里默认调到 8，优先改善单卡评测时的数据等待；多卡时若 CPU 压力过大，可按每卡 4 往回调。
  num_workers: 64
  pin_memory: true
  prefetch_factor: 4
  # 若未来希望从训练集内部切验证集，可启用该比例
  val_ratio: 0.0

sampling:
  eval:
    # 评测默认用 greedy，保证前后模型可直接比较
    decode: greedy
    top_k: 10
    top_p: 0.9
    temperature: 1.0
    start_symbol: BOS
    start_mat: null
    max_len: null
    batch_size: 4096

evaluation:
  # 需要评测的 split
  splits: [train, val]
  batch_size: 4096
  scoring_batch_size: 4096
  # 是否保存样本级 JSONL。全量数据很大，默认关闭。
  save_samples: false
  # 是否保存评测统计图总览。该图在各 rank 本地累计计数后统一汇总，开销较小。
  save_distribution_plots: true
  distribution_plots:
    # R-RMSE / T-RMSE 直方图 bin 数与最大横轴范围。
    rt_rmse_bins: 100
    rt_rmse_max: 0.5
    # 序列误差直方图 bin 数与最大横轴范围；超出部分会并入最后一个 bin。
    sequence_loss_bins: 100
    sequence_loss_max: 10.0
    # 长度热力图的最大显示长度；最后一格会承接所有 >= 该值的样本。
    length_max: 20
  # 是否保存目标光谱与生成光谱的可视化对比图。
  # 图像会输出到 outputs/eval/<exp>/plots/<split>/rankXX/ 下。
  # 逐样本折线图较慢，默认关闭；若要排查个例再手动打开。
  save_plots: false
  # 每个 rank 最多保存多少张图，避免全量评测时产出过大。
  plot_max_samples: 32
  # 是否把预测光谱也写入样本记录。若开启，文件体积会明显增大。
  save_predicted_spectra: false

tmm:
  wavelength_range_um: [0.4, 1.1]
  num_points: 71
  incident_angle: 0.0
  polarization: 0
  material_aliases: {}
  batch_size: 4096
  # 固定补到 20 层，保证所有 batch 的 TMM 张量形状一致，减少形状抖动与分桶开销。
  pad_to_max_layers: true
  fixed_max_layers: 20
  bucket_by_layer_count: false
  pad_material: Air
  debug: false
  # 这里只是为了保持配置结构统一，实际使用的指标由 losses.spectrum_metric 控制。
  # 当前默认直接比较拼接后的 R/T 光谱，不再使用吸收率误差。
  metric: rt_rmse

losses:
  # 光谱误差指标。`rt_rmse` 表示直接比较 `[R..., T...]` 两段光谱的 RMSE。
  spectrum_metric: rt_rmse
  invalid_structure_penalty: 1.0
  nonphysical_spectrum_penalty: 1.0
  physical_tolerance: 0.01

logging:
  console_log: true
  # 是否按 DataLoader 的 batch 数量显示 tqdm 进度条。
  show_progress_bar: true

distributed:
  # 多卡超时时间，单位分钟
  timeout_minutes: 30
